# CI — Test, build, publish to npmjs (internal, every push to main)
#
# Every push to main: test → build → CalVer version → publish to npmjs (private)
# PRs: test + build only (no publish)
#
# CalVer: YYYY.MDD.PATCH (semver-compatible, no zero-padding)
# npmjs: @vibecontrols/vibe-plugin-* (private, restricted access)

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Lockfile drift guard
        run: |
          set -euo pipefail
          if [ ! -f package.json ] || [ ! -f bun.lock ]; then
            echo "No package.json/bun.lock — skipping drift check"
            exit 0
          fi
          tmp=$(mktemp -d)
          cp package.json bun.lock "$tmp/"
          [ -f bunfig.toml ] && cp bunfig.toml "$tmp/"
          (cd "$tmp" && bun install --lockfile-only) >/dev/null 2>&1
          if ! cmp -s "$tmp/bun.lock" bun.lock; then
            echo "::error::bun.lock is out of sync with package.json — must be regenerated and committed"
            echo "::error::Regen recipe: tmp=\$(mktemp -d) && cp package.json bunfig.toml bun.lock \"\$tmp/\" && (cd \"\$tmp\" && bun install --lockfile-only) && cp \"\$tmp/bun.lock\" bun.lock && git add bun.lock && git commit"
            diff -u bun.lock "$tmp/bun.lock" | head -60 || true
            exit 1
          fi
          echo "bun.lock in sync with package.json"
      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type:check

      - name: Build
        run: bun run build

  # Aggregator status required by the `main` branch ruleset. Without a job that
  # reports a "PR Gate" check, the required context sits at
  # "Expected — Waiting for status to be reported" forever and blocks the PR.
  pr-gate:
    name: PR Gate
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          result="${{ needs.test.result }}"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "::error::Test & Build $result — PR Gate fails"
            exit 1
          fi
          echo "Test & Build passed — PR Gate green"

  publish-npmjs:
    name: Publish to npmjs
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Pre-cache npm CLI
        run: bunx npm@latest --version

      - name: Compute CalVer version
        id: version
        run: |
          NAME=$(bun -e "console.log(require('./package.json').name)")
          YYYY=$(date -u '+%Y')
          MDD=$((10#$(date -u '+%m%d')))
          DATE_PREFIX="${YYYY}.${MDD}"

          EXISTING=$(bunx npm@latest view "${NAME}" versions --json 2>/dev/null \
            | jq -r '.[]? // empty' \
            | grep -E "^${DATE_PREFIX}\\.[0-9]+$" | sort -t. -k3 -n || true)

          MAX_PATCH=$(echo "$EXISTING" | tail -1 | cut -d. -f3)
          NEXT_PATCH=$(( ${MAX_PATCH:-0} + 1 ))
          VERSION="${DATE_PREFIX}.${NEXT_PATCH}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing: $NAME@$VERSION"

      - name: Publish to npmjs
        run: |
          cat > .npmrc << NPMRC
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          NPMRC
          sed -i 's/^ *//' .npmrc
          bunx npm@latest version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          bunx npm@latest publish --registry "https://registry.npmjs.org/" --tag latest --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          NAME=$(bun -e "console.log(require('./package.json').name)")
          echo "### Published to npmjs" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: \`${NAME}@${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: npmjs" >> $GITHUB_STEP_SUMMARY
